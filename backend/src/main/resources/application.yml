spring:
  config:
    import:
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:zipdaum}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ===== Redis 설정 추가 =====
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # ===== 메일 설정 추가 =====
  mail:
    host: smtp.gmail.com
    port: 465
    default-encoding: UTF-8
    username: ${MAIL_USERNAME} # .env 파일에서 주입
    password: ${MAIL_PASSWORD} # .env 파일에서 주입
    properties:
      mail:
        debug: true
        smtp:
          auth: true
          starttls:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
        smtps:
          ssl:
            checkserveridentity: true
            trust: '*'

mybatis:
  mapper-locations: classpath:/mappers/**/*.xml

property:
  real-estate:
    service-key: ${PUBLIC_DATA_SERVICE_KEY:}
    connect-timeout: ${PUBLIC_DATA_CONNECT_TIMEOUT:5s}
    read-timeout: ${PUBLIC_DATA_READ_TIMEOUT:30s}
  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY:}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
